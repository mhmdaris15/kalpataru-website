<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalpataru</title>
    <!--
      SPA fallback for GitHub Pages.
      Pages serves this 404 for any unknown URL. We re-encode the requested
      path into the query string and redirect to the SPA index.html, where a
      small inline script in <head> restores the original path via
      history.replaceState() before React Router boots.

      pathSegmentsToKeep = 1 because the site lives under /kalpataru-website/.
      Adapted from https://github.com/rafgraph/spa-github-pages (MIT).
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
