<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d3a2d" />
    <meta name="description" content="Kalpataru — Cultural ambiance blended with Indonesia. The first Indonesian café in Saint Petersburg, serving traditional recipes passed down through generations." />
    <meta property="og:title" content="Kalpataru — A Taste of Indonesia in Saint Petersburg" />
    <meta property="og:description" content="An immersive cultural dining experience: heritage recipes, Wayang artistry, and the warmth of Java in the heart of Russia." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,200..900,30..100;1,9..144,200..900,30..100&family=Inter:wght@300;400;500;600;700&family=Caveat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!--
      SPA path restorer — counterpart to public/404.html. Reads the encoded
      original path back out of the query string and rewrites the URL via
      history.replaceState before React Router boots. Adapted from
      https://github.com/rafgraph/spa-github-pages (MIT).
    -->
    <script>
      (function () {
        var l = window.location;
        if (l.search.charAt(1) === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
    <title>Kalpataru — Cultural Ambiance Blend with Indonesia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
